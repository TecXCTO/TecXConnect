<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time WebSocket Chat Workspace</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f3f4f6; margin: 20px; display: flex; gap: 20px; height: 85vh; }
        #auth-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; justify-content: center; align-items: center; z-index: 10; flex-direction: column; gap: 10px;}
        #users-panel { width: 250px; background: white; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #chat-panel { flex-grow: 1; background: white; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        #msg-log { flex-grow: 1; border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px; overflow-y: auto; background: #fafafa; margin-bottom: 10px; }
        .user-item { padding: 8px; margin: 4px 0; background: #f9fafb; cursor: pointer; border-radius: 4px; border: 1px solid transparent; }
        .user-item:hover { background: #eff6ff; }
        .user-item.selected { background: #dbeafe; border-color: #3b82f6; }
        input, button { padding: 10px; border-radius: 6px; border: 1px solid #d1d5db; font-size: 14px; }
        button { background: #2563eb; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        #input-row { display: flex; gap: 10px; }
        #input-row input { flex-grow: 1; }
    </style>
</head>
<body>

    <!-- Authentication Overlay Screen -->
    <div id="auth-panel">
        <h3>Enter a unique chat handle to start</h3>
        <div>
            <input type="text" id="username-in" placeholder="Username...">
            <button onclick="initSession()">Connect to Server</button>
        </div>
    </div>

    <!-- Active User Sidebar -->
    <div id="users-panel">
        <h4>Online Users Dashboard</h4>
        <div id="users-list"></div>
    </div>

    <!-- Messaging Workspace Panel -->
    <div id="chat-panel">
        <h4 id="active-chat-header">Select a user from the sidebar to chat</h4>
        <div id="msg-log"></div>
        <div id="input-row">
            <input type="text" id="msg-in" placeholder="Type your message here..." disabled>
            <button id="send-btn" onclick="transmitMsg()" disabled>Send</button>
        </div>
    </div>

    <script>
        let ws;
        let myUsername = "";
        let selectedRecipient = "";

        function initSession() {
            myUsername = document.getElementById("username-in").value.trim();
            if(!myUsername) return alert("Please enter a username.");

            // Open the persistent WebSocket connection tunnel
            ws = new WebSocket("ws://localhost:8765");

            ws.onopen = () => {
                // Register identity with the server instantly on connect
                ws.send(JSON.stringify({ type: "register", username: myUsername }));
                document.getElementById("auth-panel").style.display = "none";
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === "user_list") {
                    renderUsersList(data.users);
                } else if (data.type === "incoming_msg") {
                    appendLog(data.from, data.text, "received");
                }
            };

            ws.onclose = () => {
                alert("Connection dropped from server.");
                location.reload();
            };
        }

        function renderUsersList(users) {
            const container = document.getElementById("users-list");
            container.innerHTML = "";
            users.forEach(user => {
                if(user === myUsername) return; // Skip listing yourself
                
                const div = document.createElement("div");
                div.className = `user-item ${user === selectedRecipient ? 'selected' : ''}`;
                div.innerText = `🟢 ${user}`;
                div.onclick = () => selectTargetUser(user, div);
                container.appendChild(div);
            });
        }

        function selectTargetUser(user, element) {
            selectedRecipient = user;
            document.getElementById("active-chat-header").innerText = `Chatting with: ${user}`;
            document.getElementById("msg-in").disabled = false;
            document.getElementById("send-btn").disabled = false;
            
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }

        function transmitMsg() {
            const input = document.getElementById("msg-in");
            const text = input.value.trim();
            if(!text || !selectedRecipient) return;

            // Transmit text package structure directly down active socket tunnel
            ws.send(JSON.stringify({
                type: "chat_message",
                to: selectedRecipient,
                text: text
            }));

            appendLog("You", text, "sent");
            input.value = "";
        }

        function appendLog(sender, text, directionalClass) {
            const log = document.getElementById("msg-log");
            const msgNode = document.createElement("div");
            msgNode.style.margin = "8px 0";
            msgNode.innerHTML = `<strong>[${sender}]:</strong> ${text}`;
            log.appendChild(msgNode);
            log.scrollTop = log.scrollHeight; // Keep log automatically scrolled to bottom
        }
    </script>
</body>
</html>
