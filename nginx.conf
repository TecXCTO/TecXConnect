server {
    listen 443 ssl;
    server_name ://tecx.ai;

    # Paths pointing to your SSL security keys (e.g., Let's Encrypt certificates)
    ssl_certificate /etc/letsencrypt/live/://tecx.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/://tecx.ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /ws/ {
        # Route traffic internally down to the named Docker Compose container service block
        proxy_pass http://chat-server:8765;

        # CRITICAL: These headers force Nginx to upgrade standard HTTP connections to a persistent WebSocket pipe
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Forward real source context parameters down to the backend app loggers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent Nginx from closing connections that sit idle for short periods
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
